name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    name: Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

  build:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/focused_sinoussi:churn-api .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/focused_sinoussi:churn-api

  deploy:
    name: Deploy to EC2 Instance
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Pull latest image from Docker Hub"
            docker pull ${{ secrets.DOCKER_USERNAME }}/focused_sinoussi:churn-api

            echo "Stop existing container"
            docker stop churn-api || true

            echo "Remove existing container"
            docker rm churn-api || true

           
            echo "Run new container"
            docker run -d --name churn-api -p 80:8000 ${{ secrets.DOCKER_USERNAME }}/focused_sinoussi:churn-api

            echo "Deployment completed successfully"
